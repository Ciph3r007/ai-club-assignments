services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-northwind}
            POSTGRES_USER: ${POSTGRES_USER:-querygraphuser}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-querygraphpass}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./scripts/database:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-querygraphuser} -d ${POSTGRES_DB:-northwind}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

volumes:
    postgres_data:
